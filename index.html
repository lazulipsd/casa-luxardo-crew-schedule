<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Casa Luxardo · Production Schedule</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Vend+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

        <style>
            :root {
                --bg: #0a0a0a;
                --bg-2: #121212;
                --yellow: #F2FF00;
                --cyan: #00CAF6;
                --white: #F4F1EA;
                --muted: rgba(244, 241, 234, 0.55);
                --muted-2: rgba(244, 241, 234, 0.32);
                --line: rgba(244, 241, 234, 0.09);
                --line-strong: rgba(244, 241, 234, 0.16);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            ::selection { background: rgba(244, 241, 234, 0.18); color: var(--white); }
            ::-moz-selection { background: rgba(244, 241, 234, 0.18); color: var(--white); }

            .staticrypt-html { height: 100%; }
            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: 'Vend Sans', system-ui, -apple-system, sans-serif;
                color: var(--white);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background:
                    radial-gradient(120% 80% at 50% -10%, rgba(242, 255, 0, 0.05), transparent 55%),
                    radial-gradient(100% 60% at 100% 110%, rgba(0, 202, 246, 0.04), transparent 60%),
                    var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 440px;
                margin: 0;
                padding: 0;
            }

            .staticrypt-form {
                background: var(--bg-2);
                border: 1px solid var(--line-strong);
                border-radius: 20px;
                padding: 40px 36px 30px;
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
                text-align: left;
            }

            .sc-kicker {
                font-size: 11px;
                color: var(--cyan);
                text-transform: uppercase;
                letter-spacing: 2.4px;
                font-weight: 500;
                margin-bottom: 0.7em;
            }
            .sc-title {
                font-family: 'Instrument Serif', serif;
                font-size: 46px;
                font-weight: 400;
                line-height: 0.96;
                letter-spacing: -0.015em;
                color: var(--white);
                margin-bottom: 18px;
            }
            .sc-title em { font-style: italic; color: var(--yellow); }
            .staticrypt-instructions {
                margin: 0 0 26px 0;
                border-top: 1px solid var(--line-strong);
                padding-top: 16px;
            }
            .staticrypt-instructions p {
                color: var(--muted);
                font-size: 13.5px;
                line-height: 1.5;
                font-family: 'Vend Sans', sans-serif;
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                background: rgba(244, 241, 234, 0.04);
                border: 1px solid var(--line);
                border-radius: 12px;
                margin-bottom: 14px;
                transition: border-color 0.25s ease, background 0.25s ease;
            }
            .staticrypt-password-container:focus-within {
                border-color: rgba(242, 255, 0, 0.55);
                background: rgba(242, 255, 0, 0.04);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                outline: 0;
                width: 100%;
                padding: 16px 50px 16px 18px;
                font-size: 15px;
                font-family: 'Vend Sans', sans-serif;
                color: var(--white);
                font-weight: 400;
                letter-spacing: 0.5px;
            }
            .staticrypt-form input::placeholder {
                color: var(--muted-2);
                letter-spacing: 1.5px;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.45;
                padding: 14px;
                box-sizing: content-box;
                position: absolute;
                right: 4px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.2s ease;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 18px;
                font-size: 12.5px;
                color: var(--muted);
                cursor: pointer;
                user-select: none;
            }
            .staticrypt-remember input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 18px;
                height: 18px;
                border: 1px solid var(--line-strong);
                border-radius: 5px;
                background: rgba(244, 241, 234, 0.04);
                cursor: pointer;
                position: relative;
                transition: all 0.2s ease;
                flex-shrink: 0;
            }
            .staticrypt-remember input[type="checkbox"]:checked {
                background: var(--yellow);
                border-color: var(--yellow);
            }
            .staticrypt-remember input[type="checkbox"]:checked::after {
                content: '';
                position: absolute;
                left: 5px;
                top: 1px;
                width: 5px;
                height: 10px;
                border: solid var(--bg);
                border-width: 0 2px 2px 0;
                transform: rotate(45deg);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: 'Vend Sans', sans-serif;
                font-size: 13px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 2px;
                outline: 0;
                background: var(--yellow);
                color: var(--bg);
                width: 100%;
                border: 0;
                padding: 16px;
                border-radius: 10px;
                cursor: pointer;
                transition: filter 0.2s ease, transform 0.1s ease, box-shadow 0.25s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                filter: brightness(1.08);
                box-shadow: 0 12px 32px rgba(242, 255, 0, 0.25);
            }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: scale(0.985); }
            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                box-shadow: 0 0 0 3px rgba(242, 255, 0, 0.4);
            }

            .staticrypt-error {
                margin-top: 14px;
                padding: 11px 14px;
                border-radius: 10px;
                background: rgba(255, 87, 34, 0.08);
                border: 1px solid rgba(255, 87, 34, 0.35);
                color: #ff9472;
                font-size: 12.5px;
                line-height: 1.4;
                opacity: 0;
                transform: translateY(-4px);
                transition: opacity 0.3s ease, transform 0.3s ease;
                pointer-events: none;
            }
            .staticrypt-error.visible {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }

            .staticrypt-footer {
                margin-top: 22px;
                text-align: center;
                font-size: 10px;
                letter-spacing: 1.6px;
                text-transform: uppercase;
                color: var(--muted-2);
            }
            .staticrypt-footer .cyan-dot {
                display: inline-block;
                width: 5px; height: 5px;
                border-radius: 50%;
                background: var(--cyan);
                vertical-align: middle;
                margin-right: 8px;
                box-shadow: 0 0 10px rgba(0, 202, 246, 0.6);
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 2px solid rgba(242, 255, 0, 0.18);
                border-top-color: var(--yellow);
                border-radius: 50%;
                animation: spinner-border 0.85s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-form { padding: 32px 24px 26px; border-radius: 18px; }
                .sc-title { font-size: 38px; }
            }
        </style>
    </head>
